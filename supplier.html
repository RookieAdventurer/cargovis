<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Tracker — Suppliers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#1F3864; --navy-dark:#0F1B35; --navy-light:#2A4A7F;
      --blue-soft:#4A7FBF; --blue-pale:#93C5FD;
      --bg:#F8FAFC; --surface:#ffffff;
      --border:#E5E7EB; --border-soft:#F3F4F6;
      --text-1:#111827; --text-2:#6B7280; --text-3:#9CA3AF;
      --green-bg:#D1FAE5; --green-text:#065F46; --green:#059669;
      --red-bg:#FEE2E2; --red-text:#991B1B; --red:#DC2626;
      --blue-bg:#DBEAFE; --blue-text:#1D4ED8;
      --amber-bg:#FEF3C7; --amber-text:#92400E;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-1)}

    /* NAV */
    .nav{background:var(--navy);height:56px;display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:30px;height:30px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .nav-logo-name{color:#fff;font-size:15px;font-weight:600;letter-spacing:-0.2px}
    .nav-links{display:flex;gap:2px;margin-left:32px}
    .nav-link{color:rgba(255,255,255,0.55);font-size:13px;padding:6px 14px;border-radius:7px;text-decoration:none;font-weight:500;transition:background 0.15s,color 0.15s}
    .nav-link:hover{background:rgba(255,255,255,0.1);color:#fff}
    .nav-link.active{background:rgba(255,255,255,0.15);color:#fff}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
    .nav-date{font-size:12px;color:rgba(255,255,255,0.45)}
    .nav-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;position:relative}
    .nav-avatar-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:6px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
    .nav-avatar:hover .nav-avatar-menu{display:block}
    .nav-avatar-menu a{display:block;padding:8px 12px;font-size:13px;color:var(--text-1);text-decoration:none;border-radius:6px}
    .nav-avatar-menu a:hover{background:var(--bg)}
    .nav-avatar-menu a.danger{color:var(--red)}

    /* MAIN */
    .main{max-width:1280px;margin:0 auto;padding:28px 28px 60px}

    /* PAGE HEADER */
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .page-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
    .page-sub{font-size:13px;color:var(--text-2);margin-top:2px}

    /* BUTTONS */
    .btn{height:38px;padding:0 16px;border:0.5px solid var(--border);border-radius:9px;background:var(--surface);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-1);cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.15s;font-weight:500;text-decoration:none}
    .btn:hover{background:var(--bg);border-color:#D1D5DB}
    .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
    .btn-primary:hover{background:var(--navy-light);border-color:var(--navy-light)}
    .btn-danger{color:var(--red-text);border-color:#FECACA}
    .btn-danger:hover{background:var(--red-bg)}
    .btn-icon{width:16px;height:16px}

    /* SUPPLIER GRID */
    .supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}

    .supplier-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.15s}
    .supplier-card:hover{border-color:#D1D5DB}
    .supplier-card-header{padding:18px 20px 14px;border-bottom:0.5px solid var(--border-soft);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .supplier-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}
    .supplier-name{font-size:15px;font-weight:600;letter-spacing:-0.2px}
    .supplier-sub{font-size:12px;color:var(--text-3);margin-top:2px}
    .supplier-card-body{padding:14px 20px}
    .supplier-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .supplier-stat{text-align:center;padding:10px 8px;background:var(--bg);border-radius:8px}
    .supplier-stat-val{font-size:18px;font-weight:600;line-height:1}
    .supplier-stat-lbl{font-size:10px;color:var(--text-3);margin-top:3px;font-weight:500}
    .supplier-latest{font-size:12px;color:var(--text-2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .supplier-card-footer{padding:12px 20px;border-top:0.5px solid var(--border-soft);display:flex;gap:8px}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
    .badge .dot{width:5px;height:5px;border-radius:50%}
    .badge.active-b{background:var(--blue-bg);color:var(--blue-text)}
    .badge.active-b .dot{background:#3B82F6}

    /* ADD SUPPLIER CARD */
    .add-supplier-card{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:32px 20px;cursor:pointer;transition:all 0.15s;min-height:200px}
    .add-supplier-card:hover{border-color:var(--blue-soft);background:#F0F9FF}
    .add-supplier-card:hover .add-icon{background:#EFF6FF;color:var(--blue-soft)}
    .add-icon{width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all 0.15s}
    .add-label{font-size:13px;font-weight:500;color:var(--text-2)}
    .add-sub{font-size:11px;color:var(--text-3)}

    /* RECENT CONTAINERS TABLE */
    .recent-section{margin-top:8px}
    .recent-title{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .mini-table{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
    .mini-head{display:grid;grid-template-columns:1.4fr 1.4fr 1.6fr 0.9fr;gap:8px;padding:9px 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
    .mini-th{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:0.04em;text-transform:uppercase}
    .mini-row{display:grid;grid-template-columns:1.4fr 1.4fr 1.6fr 0.9fr;gap:8px;padding:11px 16px;border-bottom:0.5px solid var(--border-soft);align-items:center}
    .mini-row:last-child{border-bottom:none}
    .mini-cell{font-size:12px;color:var(--text-1)}
    .mini-cell.mono{font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
    .mini-cell.muted{color:var(--text-2)}
    .badge.arrived{background:var(--green-bg);color:var(--green-text)}
    .badge.arrived .dot{background:var(--green)}
    .badge.pending{background:var(--red-bg);color:var(--red-text)}
    .badge.pending .dot{background:var(--red)}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:28px;width:100%;max-width:440px;animation:modalIn 0.2s ease}
    @keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .modal-title{font-size:17px;font-weight:600;margin-bottom:4px}
    .modal-sub{font-size:13px;color:var(--text-2);margin-bottom:22px;line-height:1.5}
    .form-group{margin-bottom:16px}
    .form-label{font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:5px;display:block}
    .form-input{width:100%;height:40px;padding:0 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-1);outline:none;transition:border-color 0.15s;appearance:none}
    .form-input:focus{border-color:var(--blue-soft);background:var(--surface)}
    .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
    .color-swatch{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
    .color-swatch.selected{border-color:var(--navy);transform:scale(1.08)}
    .color-swatch:hover{transform:scale(1.05)}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;padding-top:18px;border-top:0.5px solid var(--border)}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;transition:transform 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.success{background:#065F46}
    .toast.error{background:var(--red-text)}

    @media(max-width:600px){.main{padding:16px}.nav-date{display:none}}
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="dashboard.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <span class="nav-logo-name">Container Tracker</span>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Active</a>
    <a href="archive.html"   class="nav-link">Archive</a>
    <a href="suppliers.html" class="nav-link active">Suppliers</a>
  </div>
  <div class="nav-right">
    <span class="nav-date" id="navDate"></span>
    <div class="nav-avatar">
      YO
      <div class="nav-avatar-menu">
        <a href="#">My account</a>
        <a href="index.html" class="danger">Sign out</a>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Suppliers</div>
      <div class="page-sub" id="pageSub">Manage your supplier groups</div>
    </div>
  </div>

  <!-- Supplier grid -->
  <div class="supplier-grid" id="supplierGrid"></div>

  <!-- Recent containers across all suppliers -->
  <div class="recent-section">
    <div class="recent-title">
      <span>All active containers — quick view</span>
      <a href="dashboard.html" class="btn" style="height:32px;font-size:12px">View full dashboard →</a>
    </div>
    <div class="mini-table">
      <div class="mini-head">
        <div class="mini-th">Container no.</div>
        <div class="mini-th">Vessel</div>
        <div class="mini-th">ETA</div>
        <div class="mini-th">Status</div>
      </div>
      <div id="miniTableBody"></div>
    </div>
  </div>
</main>

<!-- ADD / EDIT SUPPLIER MODAL -->
<div class="modal-overlay" id="supplierModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add supplier</div>
    <div class="modal-sub">Suppliers are groups that organise your containers — usually the company you're buying from.</div>
    <div class="form-group">
      <label class="form-label">Supplier name *</label>
      <input class="form-input" type="text" id="supplierNameInput" placeholder="e.g. Poland, Hosanna, TEX">
    </div>
    <div class="form-group">
      <label class="form-label">Colour</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <input class="form-input" type="text" id="supplierNotesInput" placeholder="e.g. Main clothing supplier from Warsaw">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveSupplierBtn" onclick="saveSupplier()">Add supplier</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const COLORS = [
  '#1F3864','#C53030','#276749','#C27D10',
  '#1D4ED8','#7C3AED','#0F766E','#B45309',
  '#DC2626','#059669','#2563EB','#9333EA',
];

const DEFAULT_SUPPLIERS = [
  { id:'POLAND',  name:'Poland',  color:'#1F3864', notes:'Main clothing supplier' },
  { id:'HOSANNA', name:'Hosanna', color:'#276749', notes:'' },
  { id:'TEX',     name:'TEX',     color:'#C27D10', notes:'' },
  { id:'OFTEX',   name:'OFTEX',   color:'#C53030', notes:'CMA CGM primarily' },
];

let suppliers  = [];
let activeData = [];
let archiveData = [];
let editingId   = null;
let selectedColor = COLORS[0];

// ── STORAGE ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const s  = await window.storage.get('ct_suppliers');
    const a  = await window.storage.get('ct_active');
    const ar = await window.storage.get('ct_archive');
    suppliers   = s  ? JSON.parse(s.value)  : JSON.parse(JSON.stringify(DEFAULT_SUPPLIERS));
    activeData  = a  ? JSON.parse(a.value)  : [];
    archiveData = ar ? JSON.parse(ar.value) : [];
  } catch(e) {
    suppliers   = JSON.parse(JSON.stringify(DEFAULT_SUPPLIERS));
    activeData  = [];
    archiveData = [];
  }
  render();
}

async function saveSuppliers() {
  try { await window.storage.set('ct_suppliers', JSON.stringify(suppliers)); } catch(e) {}
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────
function formatDateFull(iso) {
  if (!iso || iso === '—') return '—';
  const d = new Date(iso);
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dd  = d.getDate();
  const sfx = [,'st','nd','rd'][dd%10<4&&(dd<11||dd>13)?dd%10:0]||'th';
  return `${days[d.getDay()]}, ${dd}${sfx} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getStatus(etaStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(etaStr); d.setHours(0,0,0,0);
  return d <= today ? 'arrived' : 'pending';
}

function todayFull() { return formatDateFull(new Date().toISOString().split('T')[0]); }

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.1)`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('navDate').textContent = todayFull();
  document.getElementById('pageSub').textContent = `${suppliers.length} supplier${suppliers.length!==1?'s':''} · ${activeData.length} active containers`;
  renderGrid();
  renderMiniTable();
  renderColorGrid();
}

function renderGrid() {
  const grid = document.getElementById('supplierGrid');
  let html = suppliers.map(s => {
    const active   = activeData.filter(r => r.supplier === s.id);
    const archived = archiveData.filter(r => r.supplier === s.id);
    const arrived  = active.filter(r => getStatus(r.eta) === 'arrived').length;
    const latest   = active.length
      ? active.sort((a,b) => new Date(a.eta) - new Date(b.eta))[0]
      : null;
    const initials = s.name.substring(0,2).toUpperCase();

    return `
      <div class="supplier-card">
        <div class="supplier-card-header">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="supplier-icon" style="background:${lighten(s.color)};color:${s.color}">${initials}</div>
            <div>
              <div class="supplier-name">${s.name}</div>
              <div class="supplier-sub">${s.notes || 'No notes'}</div>
            </div>
          </div>
          <span class="badge active-b"><span class="dot"></span>${active.length} active</span>
        </div>
        <div class="supplier-card-body">
          <div class="supplier-stat-row">
            <div class="supplier-stat">
              <div class="supplier-stat-val" style="color:${s.color}">${active.length}</div>
              <div class="supplier-stat-lbl">Active</div>
            </div>
            <div class="supplier-stat">
              <div class="supplier-stat-val" style="color:#059669">${arrived}</div>
              <div class="supplier-stat-lbl">Arrived</div>
            </div>
            <div class="supplier-stat">
              <div class="supplier-stat-val" style="color:#6B7280">${archived}</div>
              <div class="supplier-stat-lbl">Archived</div>
            </div>
          </div>
          ${latest
            ? `<div class="supplier-latest">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Next arrival: ${formatDateFull(latest.eta)}
               </div>`
            : `<div class="supplier-latest" style="color:var(--text-3);font-style:italic">No upcoming containers</div>`
          }
        </div>
        <div class="supplier-card-footer">
          <a href="dashboard.html" class="btn" style="height:32px;font-size:12px;flex:1;justify-content:center">View containers</a>
          <button class="btn" style="height:32px;font-size:12px" onclick="openEdit('${s.id}')">Edit</button>
          ${!DEFAULT_SUPPLIERS.find(d=>d.id===s.id)
            ? `<button class="btn btn-danger" style="height:32px;font-size:12px;padding:0 10px" onclick="deleteSupplier('${s.id}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
               </button>`
            : ''
          }
        </div>
      </div>`;
  }).join('');

  // Add new supplier card
  html += `
    <div class="add-supplier-card" onclick="openAdd()">
      <div class="add-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <div class="add-label">Add new supplier</div>
      <div class="add-sub">Create a new group for containers</div>
    </div>`;

  grid.innerHTML = html;
}

function renderMiniTable() {
  const body = document.getElementById('miniTableBody');
  const sorted = [...activeData].sort((a,b) => new Date(a.eta) - new Date(b.eta)).slice(0,8);
  if (!sorted.length) {
    body.innerHTML = `<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-3)">No active containers</div>`;
    return;
  }
  body.innerHTML = sorted.map(r => {
    const s = getStatus(r.eta);
    return `
      <div class="mini-row">
        <div class="mini-cell mono">${r.container}</div>
        <div class="mini-cell muted">${r.vessel}</div>
        <div class="mini-cell muted">${formatDateFull(r.eta)}</div>
        <div class="mini-cell">
          <span class="badge ${s}"><span class="dot"></span>${s==='arrived'?'Arrived':'Not arrived'}</span>
        </div>
      </div>`;
  }).join('');
}

function renderColorGrid(selected) {
  const sel = selected || selectedColor;
  document.getElementById('colorGrid').innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c===sel?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  selectedColor = COLORS[0];
  document.getElementById('modalTitle').textContent   = 'Add supplier';
  document.getElementById('saveSupplierBtn').textContent = 'Add supplier';
  document.getElementById('supplierNameInput').value  = '';
  document.getElementById('supplierNotesInput').value = '';
  renderColorGrid(COLORS[0]);
  document.getElementById('supplierModal').classList.add('open');
}

function openEdit(id) {
  editingId = id;
  const s = suppliers.find(x => x.id === id);
  if (!s) return;
  selectedColor = s.color;
  document.getElementById('modalTitle').textContent   = 'Edit supplier';
  document.getElementById('saveSupplierBtn').textContent = 'Save changes';
  document.getElementById('supplierNameInput').value  = s.name;
  document.getElementById('supplierNotesInput').value = s.notes || '';
  renderColorGrid(s.color);
  document.getElementById('supplierModal').classList.add('open');
}

function closeModal() { document.getElementById('supplierModal').classList.remove('open'); }

function pickColor(c) { selectedColor = c; renderColorGrid(c); }

function saveSupplier() {
  const name  = document.getElementById('supplierNameInput').value.trim();
  const notes = document.getElementById('supplierNotesInput').value.trim();
  if (!name) { showToast('Please enter a supplier name', 'error'); return; }

  if (editingId) {
    const idx = suppliers.findIndex(s => s.id === editingId);
    if (idx > -1) {
      suppliers[idx] = { ...suppliers[idx], name, color: selectedColor, notes };
    }
    showToast('Supplier updated', 'success');
  } else {
    const id = name.toUpperCase().replace(/\s+/g,'_');
    if (suppliers.find(s => s.id === id)) { showToast('A supplier with this name already exists', 'error'); return; }
    suppliers.push({ id, name, color: selectedColor, notes });
    showToast('Supplier added', 'success');
  }

  saveSuppliers();
  closeModal();
  render();
}

function deleteSupplier(id) {
  const s = suppliers.find(x => x.id === id);
  const count = activeData.filter(r => r.supplier === id).length;
  if (count > 0) {
    showToast(`Cannot delete — ${count} active container${count>1?'s':''} assigned to this supplier`, 'error');
    return;
  }
  if (!confirm(`Delete supplier "${s?.name}"? This cannot be undone.`)) return;
  suppliers = suppliers.filter(x => x.id !== id);
  saveSuppliers();
  render();
  showToast('Supplier deleted');
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
