<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Tracker — Active</title>
<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<!-- ============ Loading screen (port crane) ============ -->
<div class="loading-screen hidden" id="loadingScreen">
  <div style="text-align:center">
    <div class="loading-title" id="loadingTitle">Looking up your containers...</div>
    <div class="loading-sub" id="loadingSub">Checking Maersk · Hapag-Lloyd · CMA CGM · MSC</div>
    <div class="loading-progress"><div class="loading-progress-fill"></div></div>
  </div>
  <svg width="200" height="110" viewBox="0 0 200 110" fill="none" style="margin-top:10px">
    <rect x="90" y="0" width="8" height="80" fill="#4A7FBF"/>
    <rect x="98" y="0" width="60" height="6" fill="#4A7FBF"/>
    <rect x="155" y="6" width="5" height="30" fill="#4A7FBF"/>
    <rect x="85" y="78" width="18" height="30" rx="2" fill="#2A5A9F" stroke="#4A7FBF" stroke-width="1"/>
    <rect x="60" y="88" width="80" height="22" rx="2" fill="#162D50" stroke="#2A5A9F" stroke-width="1"/>
    <rect x="64" y="91" width="22" height="16" rx="1" fill="#E53E3E"/>
    <rect x="90" y="91" width="22" height="16" rx="1" fill="#276749"/>
    <rect x="116" y="91" width="20" height="16" rx="1" fill="#D69E2E"/>
    <circle cx="160" cy="10" r="5" fill="#FCD34D" opacity="0.8"/>
  </svg>
</div>

<!-- ============ Top navigation ============ -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <span class="nav-title">Container Tracker</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Active</a>
    <a href="archive.html" class="nav-link">Archive</a>
    <a href="suppliers.html" class="nav-link editor-only">Suppliers</a>
  </div>
  <div class="nav-right">
    <span class="nav-date" id="todayDate"></span>
    <div class="avatar" id="userAvatar" onclick="handleLogout()" title="Click to log out">··</div>
  </div>
</div>

<div class="page-body">

  <!-- ============ Stat cards ============ -->
  <div class="stats">
    <div class="stat" style="border-left-color: var(--navy)">
      <div class="stat-label">Active containers</div>
      <div class="stat-value" id="statActive">—</div>
      <div class="stat-sub" id="statActiveSub">across all suppliers</div>
    </div>
    <div class="stat" style="border-left-color: var(--green-accent)">
      <div class="stat-label">Arrived</div>
      <div class="stat-value" id="statArrived" style="color: var(--green-text)">—</div>
      <div class="stat-sub">ready to empty</div>
    </div>
    <div class="stat" style="border-left-color: var(--red-accent)">
      <div class="stat-label">Not yet arrived</div>
      <div class="stat-value" id="statNotArrived" style="color: var(--red-text)">—</div>
      <div class="stat-sub">in transit</div>
    </div>
    <div class="stat" style="border-left-color: var(--blue-light)">
      <div class="stat-label">Archived</div>
      <div class="stat-value" id="statArchived" style="color: #1D4ED8">—</div>
      <div class="stat-sub">emptied containers</div>
    </div>
  </div>

  <!-- ============ Toolbar ============ -->
  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search container, vessel, supplier..." oninput="renderTable()">
    </div>
    <select class="btn" id="filterSupplier" onchange="renderTable()">
      <option value="">All suppliers</option>
    </select>
    <select class="btn" id="filterStatus" onchange="renderTable()">
      <option value="">All statuses</option>
      <option value="ARRIVED">Arrived</option>
      <option value="NOT ARRIVED">Not arrived</option>
    </select>
    <div class="timeline-toggle">
      <button id="viewBySupplier" class="active" onclick="setView('supplier')">By supplier</button>
      <button id="viewByTimeline" onclick="setView('timeline')">Timeline</button>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px">
      <button class="btn" onclick="exportExcel()">↓ Excel</button>
      <button class="btn" onclick="exportPDF()">↓ PDF</button>
      <button class="btn btn-primary editor-only" onclick="openAddModal()">+ Add containers</button>
    </div>
  </div>

  <!-- ============ Table / Timeline container ============ -->
  <div id="contentArea"></div>

</div>

<!-- ============ Add containers modal (built in containers-ui.js) ============ -->
<div id="modalRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/containers.js"></script>
<script src="js/lookup.js"></script>
<script src="js/export.js"></script>
<script src="js/containers-ui.js"></script>
<script>
  Auth.requireLogin();
  Auth.applyRoleVisibility();

  document.getElementById("userAvatar").textContent = Auth.getRole() === "editor" ? "ED" : "VW";
  function handleLogout() {
    if (confirm("Log out of Container Tracker?")) Auth.logout();
  }

  document.getElementById("todayDate").textContent = Containers.formatFullDate(new Date().toISOString());

  let currentView = "supplier"; // 'supplier' or 'timeline'
  function setView(view) {
    currentView = view;
    document.getElementById("viewBySupplier").classList.toggle("active", view === "supplier");
    document.getElementById("viewByTimeline").classList.toggle("active", view === "timeline");
    renderTable();
  }

  // Initial load
  initDashboard();
</script>

</body>
</html>
