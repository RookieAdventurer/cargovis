
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Tracker — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html,body{height:100%;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .sky{position:fixed;inset:0;background:linear-gradient(180deg,#060D1A 0%,#0F2040 45%,#1A3560 75%,#1F3864 100%);z-index:0}
    .stars{position:fixed;inset:0;z-index:1}
    .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite var(--delay)}
    @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
    .moon{position:fixed;top:40px;right:12%;width:52px;height:52px;border-radius:50%;background:#FFF9E6;box-shadow:0 0 30px 10px rgba(255,245,180,.18);z-index:2;animation:moonGlow 4s ease-in-out infinite}
    @keyframes moonGlow{0%,100%{box-shadow:0 0 30px 10px rgba(255,245,180,.18)}50%{box-shadow:0 0 40px 16px rgba(255,245,180,.26)}}
    .ocean{position:fixed;bottom:0;left:0;right:0;height:140px;z-index:3;overflow:hidden}
    .wave{position:absolute;bottom:0;left:0;width:200%;height:100%}
    .wave-1{animation:waveMove 5s linear infinite;opacity:.9}
    .wave-2{animation:waveMove 8s linear infinite reverse;opacity:.6;bottom:-10px}
    .wave-3{animation:waveMove 6s linear infinite 1s;opacity:.4;bottom:-20px}
    @keyframes waveMove{to{transform:translateX(-50%)}}
    .ship-track{position:fixed;bottom:60px;left:0;right:0;z-index:5;pointer-events:none;animation:shipSail 14s linear infinite}
    @keyframes shipSail{0%{transform:translateX(-380px)}100%{transform:translateX(calc(100vw + 380px))}}
    .ship-bob{display:inline-block;animation:bob 3.5s ease-in-out infinite;position:relative}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(-.4deg)}50%{transform:translateY(-7px) rotate(.4deg)}}
    .wake{position:absolute;bottom:-4px;left:10px;right:10px;height:6px;background:rgba(255,255,255,.12);border-radius:50%;filter:blur(2px);animation:wake 3.5s ease-in-out infinite}
    @keyframes wake{0%,100%{transform:scaleX(1);opacity:.3}50%{transform:scaleX(1.08);opacity:.5}}
    .smoke-wrap{position:absolute;top:4px;left:92px}
    .smoke{position:absolute;border-radius:50%;background:rgba(200,220,255,.22);animation:smokePuff var(--sd) ease-out infinite var(--ss)}
    @keyframes smokePuff{0%{transform:translate(0,0) scale(.3);opacity:.8}100%{transform:translate(-12px,-46px) scale(1.8);opacity:0}}
    .card-wrap{position:relative;z-index:10;width:100%;max-width:360px;padding:0 16px}
    .card{background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.13);border-radius:20px;padding:36px 32px;backdrop-filter:blur(12px)}
    .logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
    .logo-icon{width:56px;height:56px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center}
    .logo-name{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.3px}
    .logo-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:-8px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.6);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
    .field input{width:100%;height:44px;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.15);border-radius:10px;padding:0 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:#fff;outline:none;transition:border-color .2s}
    .field input::placeholder{color:rgba(255,255,255,.25)}
    .field input:focus{border-color:#93C5FD;background:rgba(255,255,255,.12)}
    .btn-signin{width:100%;height:46px;background:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:#1F3864;cursor:pointer;margin-top:20px;transition:transform .15s,background .15s}
    .btn-signin:hover{background:#F0F4FF;transform:translateY(-1px)}
    .card-footer{text-align:center;margin-top:18px;font-size:11px;color:rgba(255,255,255,.3);line-height:1.6}
    .err{display:none;font-size:12px;color:#FCA5A5;margin-top:12px;text-align:center;padding:8px 12px;background:rgba(252,165,165,.1);border-radius:7px;border:.5px solid rgba(252,165,165,.2)}
    .err.show{display:block}
    .btn-signin.loading{pointer-events:none;color:transparent;position:relative}
    .btn-signin.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border:2px solid #1F3864;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .hl{animation:headlightPulse 1.5s ease-in-out infinite}
    @keyframes headlightPulse{0%,100%{opacity:.85}50%{opacity:1}}
  </style>
</head>
<body>
<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="ocean">
  <svg class="wave wave-1" viewBox="0 0 1440 140" preserveAspectRatio="none"><path d="M0 60 Q90 20 180 60 Q270 100 360 60 Q450 20 540 60 Q630 100 720 60 Q810 20 900 60 Q990 100 1080 60 Q1170 20 1260 60 Q1350 100 1440 60 L1440 140 L0 140 Z" fill="#0D2347"/></svg>
  <svg class="wave wave-2" viewBox="0 0 1440 120" preserveAspectRatio="none"><path d="M0 50 Q90 15 180 50 Q270 85 360 50 Q450 15 540 50 Q630 85 720 50 Q810 15 900 50 Q990 85 1080 50 Q1170 15 1260 50 Q1350 85 1440 50 L1440 120 L0 120 Z" fill="#142B52"/></svg>
  <svg class="wave wave-3" viewBox="0 0 1440 100" preserveAspectRatio="none"><path d="M0 40 Q90 10 180 40 Q270 70 360 40 Q450 10 540 40 Q630 70 720 40 Q810 10 900 40 Q990 70 1080 40 Q1170 10 1260 40 Q1350 70 1440 40 L1440 100 L0 100 Z" fill="#1A3560"/></svg>
</div>
<div class="ship-track"><div class="ship-bob">
  <svg width="260" height="100" viewBox="0 0 260 100" fill="none">
    <path d="M8 72 L252 72 L236 92 L24 92 Z" fill="#0F2040" stroke="#1F3864" stroke-width="1.2"/>
    <rect x="18" y="44" width="216" height="30" rx="4" fill="#162D50" stroke="#2A5A9F" stroke-width="1"/>
    <rect x="22" y="48" width="36" height="22" rx="2" fill="#C53030"/>
    <rect x="62" y="48" width="36" height="22" rx="2" fill="#1F3864" stroke="#93C5FD" stroke-width=".5"/>
    <rect x="102" y="48" width="36" height="22" rx="2" fill="#C27D10"/>
    <rect x="142" y="48" width="36" height="22" rx="2" fill="#276749"/>
    <rect x="182" y="48" width="48" height="22" rx="2" fill="#C53030"/>
    <line x1="60" y1="44" x2="60" y2="74" stroke="#0D2040" stroke-width="1"/>
    <line x1="100" y1="44" x2="100" y2="74" stroke="#0D2040" stroke-width="1"/>
    <line x1="140" y1="44" x2="140" y2="74" stroke="#0D2040" stroke-width="1"/>
    <line x1="180" y1="44" x2="180" y2="74" stroke="#0D2040" stroke-width="1"/>
    <rect x="32" y="22" width="168" height="24" rx="3" fill="#0F2040" stroke="#2A5A9F" stroke-width=".8"/>
    <rect x="36" y="25" width="36" height="18" rx="2" fill="#1F3864" stroke="#93C5FD" stroke-width=".5"/>
    <rect x="76" y="25" width="36" height="18" rx="2" fill="#C53030"/>
    <rect x="116" y="25" width="36" height="18" rx="2" fill="#C27D10"/>
    <rect x="156" y="25" width="40" height="18" rx="2" fill="#276749"/>
    <rect x="108" y="4" width="48" height="20" rx="3" fill="#162D50" stroke="#4A7FBF" stroke-width="1"/>
    <rect x="112" y="7" width="16" height="10" rx="1.5" fill="#7DD3FC" opacity=".35" stroke="#7DD3FC" stroke-width=".5"/>
    <rect x="132" y="7" width="16" height="10" rx="1.5" fill="#7DD3FC" opacity=".35" stroke="#7DD3FC" stroke-width=".5"/>
    <rect x="128" y="0" width="6" height="24" rx="1" fill="#2A5A9F"/>
    <rect x="124" y="0" width="14" height="5" rx="1" fill="#C53030"/>
    <rect x="0" y="60" width="10" height="12" rx="2" fill="#FCD34D" opacity=".9" class="hl"/>
    <rect x="250" y="66" width="7" height="7" rx="1" fill="#FCA5A5" opacity=".85"/>
    <line x1="8" y1="72" x2="252" y2="72" stroke="#2A5A9F" stroke-width=".8"/>
    <rect x="8" y="74" width="244" height="4" fill="#E53E3E" opacity=".35"/>
  </svg>
  <div class="smoke-wrap">
    <div class="smoke" style="width:14px;height:14px;--sd:1.5s;--ss:0s;top:0;left:0"></div>
    <div class="smoke" style="width:11px;height:11px;--sd:1.5s;--ss:.4s;top:2px;left:3px"></div>
    <div class="smoke" style="width:13px;height:13px;--sd:1.5s;--ss:.8s;top:1px;left:-2px"></div>
  </div>
  <div class="wake"></div>
</div></div>

<div class="card-wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3864" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div><div class="logo-name">Container Tracker</div><div class="logo-sub">Authorised access only</div></div>
    </div>
    <div class="field"><label>Email address</label><input type="email" id="email" placeholder="you@company.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="err" id="err"></div>
    <button class="btn-signin" id="signinBtn" onclick="handleSignIn()">Sign in</button>
    <div class="card-footer">3 authorised users · Contact your admin to request access</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://qkyjlggmirnbgagkdgch.supabase.co',
  'sb_publishable_DuJnaj-C8OqeHKTBymoItw_a5t4qtju'
);

// Stars
const se = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*65}%;left:${Math.random()*100}%;--dur:${(Math.random()*2+1.5).toFixed(1)}s;--delay:${(Math.random()*3).toFixed(1)}s`;
  se.appendChild(s);
}

// Check if already logged in
try {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) { window.location.href = 'dashboard.html'; }
} catch(e) { console.log('Session check:', e); }

window.handleSignIn = async function() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('signinBtn');
  const err      = document.getElementById('err');

  if (!email || !password) {
    err.textContent = 'Please enter your email and password.';
    err.classList.add('show'); return;
  }

  btn.classList.add('loading');
  err.classList.remove('show');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.href = 'dashboard.html';
  } catch(e) {
    btn.classList.remove('loading');
    err.textContent = 'Incorrect email or password. Please try again.';
    err.classList.add('show');
  }
};

document.addEventListener('keydown', e => { if (e.key === 'Enter') window.handleSignIn(); });
</script>
</body>
</html>
