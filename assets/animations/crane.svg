<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" class="crane-svg">
  <style>
    @keyframes craneSwing    { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes containerDrop { 0%,35%{transform:translateY(-22px);opacity:0} 50%,100%{transform:translateY(0);opacity:1} }
    @keyframes craneLight    { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes waveMove      { to{transform:translateX(-50%)} }

    .crane-swing    { transform-origin: 91px 6px; animation: craneSwing 2s ease-in-out infinite; }
    .container-drop { transform-origin: 150px 78px; animation: containerDrop 2.4s ease-in-out infinite; }
    .crane-light    { animation: craneLight 1.8s ease-in-out infinite; }
  </style>

  <!-- Ground / quay -->
  <rect x="0" y="140" width="280" height="20" fill="#0D2040"/>

  <!-- Crane legs -->
  <rect x="60"  y="80" width="10" height="60" fill="#2A5A9F"/>
  <rect x="120" y="80" width="10" height="60" fill="#2A5A9F"/>

  <!-- Cross beam -->
  <rect x="40" y="74" width="110" height="8" rx="2" fill="#3B72B8"/>

  <!-- Mast -->
  <rect x="86" y="10" width="10" height="66" fill="#3B72B8"/>

  <!-- Jib -->
  <rect x="86" y="10" width="80" height="7" rx="2" fill="#3B72B8"/>

  <!-- Back stay -->
  <line x1="91" y1="10" x2="40" y2="74" stroke="#4A7FBF" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Cable -->
  <line x1="150" y1="17" x2="150" y2="78" stroke="#93C5FD" stroke-width="1.5"/>

  <!-- Trolley -->
  <rect x="143" y="14" width="16" height="6" rx="2" fill="#4A7FBF"/>

  <!-- Suspended container (animated) -->
  <g class="container-drop">
    <rect x="134" y="78" width="32" height="18" rx="3" fill="#C53030"/>
    <line x1="134" y1="87" x2="166" y2="87" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <line x1="148" y1="78" x2="148" y2="96" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  </g>

  <!-- Stacked containers on quay -->
  <rect x="170" y="108" width="90" height="18" rx="2" fill="#162D50" stroke="#2A5A9F" stroke-width="0.8"/>
  <rect x="174" y="111" width="26" height="12" rx="1" fill="#C53030"/>
  <rect x="204" y="111" width="26" height="12" rx="1" fill="#276749"/>
  <rect x="234" y="111" width="22" height="12" rx="1" fill="#D69E2E"/>

  <rect x="178" y="92"  width="78" height="18" rx="2" fill="#0F2040"  stroke="#2A5A9F" stroke-width="0.8"/>
  <rect x="182" y="95"  width="22" height="12" rx="1" fill="#276749"/>
  <rect x="208" y="95"  width="22" height="12" rx="1" fill="#C53030"/>
  <rect x="234" y="95"  width="18" height="12" rx="1" fill="#3182CE"/>

  <!-- Crane light -->
  <circle cx="166" cy="13" r="5" fill="#FCD34D" opacity="0.85" class="crane-light"/>

  <!-- Water waves -->
  <path d="M0 148 Q17 140 35 148 Q52 156 70 148 Q87 140 105 148 Q122 156 140 148 Q157 140 175 148 Q192 156 210 148 Q227 140 245 148 Q262 156 280 148 L280 160 L0 160 Z"
        fill="#0D2040" opacity="0.6"/>
</svg>
