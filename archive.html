<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Tracker — Archive</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <div class="nav-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <span class="nav-title">Container Tracker</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Active</a>
    <a href="archive.html" class="nav-link active">Archive</a>
    <a href="suppliers.html" class="nav-link editor-only">Suppliers</a>
  </div>
  <div class="nav-right">
    <span class="nav-date" id="todayDate"></span>
    <div class="avatar" id="userAvatar" onclick="handleLogout()" title="Click to log out">··</div>
  </div>
</div>

<div class="page-body">

  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search container, vessel, supplier..." oninput="renderArchiveTable()">
    </div>
    <select class="btn" id="filterSupplier" onchange="renderArchiveTable()">
      <option value="">All suppliers</option>
    </select>
    <div style="margin-left:auto; display:flex; gap:8px">
      <button class="btn" onclick="exportExcel()">↓ Excel</button>
      <button class="btn" onclick="exportPDF()">↓ PDF</button>
    </div>
  </div>

  <div id="contentArea"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/containers.js"></script>
<script src="js/export.js"></script>
<script>
  Auth.requireLogin();
  Auth.applyRoleVisibility();
  document.getElementById("userAvatar").textContent = Auth.getRole() === "editor" ? "ED" : "VW";
  function handleLogout() {
    if (confirm("Log out of Container Tracker?")) Auth.logout();
  }
  document.getElementById("todayDate").textContent = Containers.formatFullDate(new Date().toISOString());

  let allArchived = [];
  let allSuppliers = [];

  async function initArchive() {
    allSuppliers = await Containers.fetchSuppliers();
    const select = document.getElementById("filterSupplier");
    allSuppliers.forEach((s) => {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.name;
      select.appendChild(opt);
    });

    allArchived = await Containers.fetchArchivedContainers();
    renderArchiveTable();
  }

  function renderArchiveTable() {
    const q = (document.getElementById("searchInput").value || "").toLowerCase();
    const supplierFilter = document.getElementById("filterSupplier").value;

    const filtered = allArchived.filter((c) => {
      if (q) {
        const haystack = `${c.container_number} ${c.vessel || ""} ${c.suppliers?.name || ""}`.toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (supplierFilter && c.supplier_id !== supplierFilter) return false;
      return true;
    });

    const container = document.getElementById("contentArea");

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-title">No archived containers yet</div>
          <div class="empty-sub">Containers you mark as emptied will appear here with the date they were emptied</div>
        </div>
      `;
      return;
    }

    const grouped = {};
    filtered.forEach((c) => {
      const name = c.suppliers ? c.suppliers.name : "Unassigned";
      if (!grouped[name]) grouped[name] = [];
      grouped[name].push(c);
    });

    let html = '<div class="table-wrap">';
    Object.entries(grouped).forEach(([supplierName, rows], idx) => {
      html += `
        <div class="section-header" style="${idx > 0 ? 'border-top:0.5px solid var(--grey-border)' : ''}">
          <span class="section-name">${supplierName.toUpperCase()}</span>
          <span class="section-count">${rows.length} container${rows.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="t-head" style="grid-template-columns: 1.4fr 1.5fr 1.7fr 0.9fr 0.8fr 1fr">
          <div class="th">Container no.</div>
          <div class="th">Vessel</div>
          <div class="th">ETA</div>
          <div class="th">Line</div>
          <div class="th">Recipient</div>
          <div class="th">Emptied on</div>
        </div>
      `;
      rows.forEach((c) => {
        html += `
          <div class="t-row" style="grid-template-columns: 1.4fr 1.5fr 1.7fr 0.9fr 0.8fr 1fr; cursor:default">
            <div class="mono">${c.container_number}</div>
            <div class="muted">${c.vessel || "—"}</div>
            <div class="muted">${Containers.formatFullDate(c.eta)}</div>
            <div class="muted">${c.shipping_line || "—"}</div>
            <div class="muted">${c.recipient || "WAGYINGO"}</div>
            <div class="muted">${Containers.formatFullDate(c.emptied_on)}</div>
          </div>
        `;
      });
      html += "";
    });
    html += "</div>";
    container.innerHTML = html;
  }

  initArchive();
</script>

</body>
</html>
